model:
  unet:
    in_channels: 3
    num_classes: 1
    bilinear: true
  segformer:
    pretrained_model_name: "nvidia/mit-b0"
    num_classes: 1
  sam:
    checkpoint_url: "https://dl.fbaipublicfiles.com/segment_anything/sam_vit_b_01ec64.pth"
    model_type: "vit_b"

dataset:
  image_size: 256
  batch_size: 8
  val_split: 0.2
  num_workers: 0

training:
  epochs: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  mixed_precision: true
  checkpoint_dir: "checkpoints"
  wandb_logging: false
  wandb_project: "visionguard-ai"

onnx:
  export_path: "checkpoints/unet_model.onnx"
  opset_version: 15

api:
  host: "0.0.0.0"
  port: 8000
